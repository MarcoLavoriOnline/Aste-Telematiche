name: DEBUG - Diagnosi connessione al sito

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le dipendenze
        run: pip install requests

      - name: Esegui la diagnosi
        run: python debug_fetch.py

      - name: Carica i file diagnostici come artifact scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            debug_response.html
            debug_headers.txt
