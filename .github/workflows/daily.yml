name: Scraping giornaliero aste Tribunale di Genova

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le dipendenze
        run: pip install requests beautifulsoup4 lxml

      - name: Esegui lo scraper e il confronto giornaliero
        run: python run_daily.py

      - name: Salva i nuovi snapshot nel repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --staged --quiet || git commit -m "Snapshot aste $(date +'%Y-%m-%d')"
          git push
