name: Scraping giornaliero aste Tribunale di Genova

on:
  schedule:
    # Ogni giorno alle 8:00 ora italiana (7:00 UTC in inverno, 6:00 UTC in estate;
    # qui uso 6:00 UTC cosi' in estate scatta alle 8 italiane, in inverno alle 7)
    - cron: '0 6 * * *'
  workflow_dispatch: {}   # permette anche di farlo partire manualmente col bottone "Run workflow"

# Impedisce a due esecuzioni di girare in parallelo (es. uno scheduled e uno
# manuale che si sovrappongono): la seconda aspetta che la prima finisca,
# invece di generare conflitti quando entrambe provano a salvare gli stessi file.
concurrency:
  group: scraping-aste-genova
  cancel-in-progress: false

permissions:
  contents: write   # serve per poter salvare i nuovi snapshot e la pagina dentro al repository
  issues: write      # serve per poter aprire la Issue di notifica

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le dipendenze
        run: pip install playwright requests

      - name: Installa il browser Chromium per Playwright
        run: playwright install --with-deps chromium

      - name: Esegui lo scraper e il confronto giornaliero
        run: python run_daily.py

      - name: Carica screenshot/html di debug se lo scraper non ha trovato risultati
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-scrape-failure
          path: |
            debug_screenshot.png
            debug_page.html
          if-no-files-found: ignore

      - name: Genera la pagina web con gli annunci
        run: |
          python geocode.py
          python generate_page.py

      - name: Apri una notifica (Issue) se ci sono novita'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python notify_issue.py

      - name: Salva snapshot e pagina web nel repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/ docs/ geocode_cache.json
          git diff --staged --quiet || git commit -m "Aggiornamento aste $(date +'%Y-%m-%d')"
          git pull --no-rebase -X ours origin main
          git push
