name: Scraping giornaliero aste Tribunale di Genova

on:
  schedule:
    # Ogni giorno alle 8:00 ora italiana (7:00 UTC in inverno, 6:00 UTC in estate;
    # qui uso 6:00 UTC cosi' in estate scatta alle 8 italiane, in inverno alle 7)
    - cron: '0 6 * * *'
  workflow_dispatch: {}   # permette anche di farlo partire manualmente col bottone "Run workflow"

permissions:
  contents: write   # serve per poter salvare i nuovi snapshot dentro al repository

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le dipendenze
        run: pip install playwright

      - name: Installa il browser Chromium per Playwright
        run: playwright install --with-deps chromium

      - name: Esegui lo scraper e il confronto giornaliero
        run: python run_daily.py

      - name: Carica screenshot/html di debug se lo scraper non ha trovato risultati
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-scrape-failure
          path: |
            debug_screenshot.png
            debug_page.html
          if-no-files-found: ignore

      - name: Salva i nuovi snapshot nel repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --staged --quiet || git commit -m "Snapshot aste $(date +'%Y-%m-%d')"
          git push
